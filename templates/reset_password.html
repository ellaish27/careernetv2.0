{% extends "base.html" %}
{% block content %}
<div class="reset-viewport">
  <main class="reset-card" role="main" aria-label="Reset password">
    <header class="reset-header">
      <div class="reset-logo">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="HCLV Logo" width="64" height="64">
      </div>
      <h1 class="reset-title">Choose a new password</h1>
      <p class="reset-subtitle">Pick something strong — at least 6 characters.</p>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.reset_password') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group form-floating">
        <input type="password" name="password" id="password" class="form-control"
               placeholder="New password" required minlength="6" autocomplete="new-password">
        <label for="password"><i class="bi bi-lock me-2"></i>New password</label>
      </div>

      <div class="form-group form-floating">
        <input type="password" name="confirm_password" id="confirm_password" class="form-control"
               placeholder="Confirm password" required minlength="6" autocomplete="new-password">
        <label for="confirm_password"><i class="bi bi-shield-lock me-2"></i>Confirm password</label>
      </div>

      <button type="submit" class="btn-primary">
        Update password
        <i class="bi bi-check-circle-fill ms-2"></i>
      </button>
    </form>

    <footer class="reset-footer">
      <a href="{{ url_for('auth.login') }}" class="back-link">
        <i class="bi bi-arrow-left me-1"></i> Back to sign in
      </a>
    </footer>
  </main>
</div>

<style>
  .reset-viewport {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--color-primary, #002147) 0%, #003366 100%);
    overflow: auto; padding: 1rem; z-index: 1;
  }
  .reset-card {
    background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
    padding: clamp(1.5rem, 4vw, 2.5rem); border-radius: 1rem;
    box-shadow: 0 10px 40px rgba(0,33,71,0.2);
    width: min(92vw, 460px); max-height: 95vh; overflow-y: auto;
    position: relative; margin: auto;
  }
  .reset-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--color-primary, #002147), var(--color-accent, #D4AF37));
    border-top-left-radius: 1rem; border-top-right-radius: 1rem;
  }
  .reset-header { text-align: center; margin-bottom: 1.5rem; }
  .reset-logo {
    width: 80px; height: 80px; background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
    box-shadow: 0 4px 12px rgba(0,33,71,0.1); border: 2px solid var(--color-accent, #D4AF37);
  }
  .reset-logo img { width: 60px; height: 60px; object-fit: contain; }
  .reset-title { color: var(--color-primary, #002147); font-size: 1.5rem; font-weight: 800; margin: 0 0 0.4rem; }
  .reset-subtitle { color: #64748b; font-size: 0.95rem; margin: 0; }

  .alert { padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.9rem; }
  .alert-info { background: #e0f2fe; color: #075985; border: 1px solid #bae6fd; }
  .alert-success { background: #dcfce7; color: #14532d; border: 1px solid #bbf7d0; }
  .alert-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }

  .form-group { margin-bottom: 1.25rem; }
  .form-floating { position: relative; }
  .form-control {
    width: 100%; padding: 1rem; border: 1px solid #e0e0e0; border-radius: 0.5rem;
    font-size: 1rem; min-height: 52px; background: #fff; color: #1a1a1a;
    transition: border-color 150ms ease, box-shadow 150ms ease;
  }
  .form-control:focus {
    outline: none; border-color: var(--color-accent, #D4AF37);
    box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
  }
  .form-floating .form-control { padding: 1.25rem 1rem; height: auto; }
  .form-floating label {
    position: absolute; top: 50%; left: 1rem; transform: translateY(-50%);
    color: #888; padding: 0 0.25rem; background: #fff;
    transition: all 150ms ease; pointer-events: none; font-size: 1rem;
  }
  .form-floating .form-control:focus ~ label,
  .form-floating .form-control:not(:placeholder-shown) ~ label {
    transform: translateY(-120%) scale(0.85);
    color: var(--color-primary, #002147); font-weight: 500;
  }

  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    background: var(--color-accent, #D4AF37); color: var(--color-primary, #002147);
    border: none; border-radius: 9999px; padding: 1rem 2rem;
    font-weight: 700; font-size: 1.05rem; text-transform: uppercase; letter-spacing: 0.5px;
    cursor: pointer; width: 100%; min-height: 48px;
    transition: all 250ms ease; box-shadow: 0 4px 12px rgba(0,33,71,0.1);
  }
  .btn-primary:hover { background: #e5c158; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,175,55,0.4); }

  .reset-footer { text-align: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid #e0e0e0; }
  .back-link { color: var(--color-accent, #D4AF37); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
  .back-link:hover { color: #b8962e; }
</style>
{% endblock %}
